services:
  - type: web
    name: yaksok-prescription
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yaksok-db
          property: connectionString
      - key: APP_PIN
        sync: false

databases:
  - name: yaksok-db
    plan: free
